<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VINSide Catalog</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
    }

    /* HEADER */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background: #e9edf2;
        border-bottom: 1px solid #d0d7de;
    }

    .logo {
        font-size: 20px;
        font-weight: bold;
        color: #2b6cb0;
    }

    .user {
        font-size: 14px;
        color: #555;
    }

    /* MAIN CONTAINER */
    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 70px);
    }

    /* WIDGET BOX */
    .widget-box {
    width: 100%;
    padding: 0;
    background: transparent;
    border: none;
    box-shadow: none;
}

    .widget-title {
        font-size: 26px;
        margin-bottom: 20px;
        color: #2c5282;
    }

    /* PLACEHOLDER FOR YOUR WIDGET */
    .widget-placeholder {
        margin-top: 20px;
        padding: 40px;
        border: 2px dashed #90cdf4;
        border-radius: 8px;
        background: #f0f9ff;
        color: #3182ce;
    }

</style>
</head>

<body>

<div class="header">
    <div class="logo">VINSide</div>
    <div class="user">user@email.com | Log out</div>
</div>

<div class="container">
    <div class="widget-box">
        <div class="widget-title">
            Search for a vehicle model
        </div>
        <script src="https://vinside.carcatonline.com/embed.js" 
            data-token="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJldWdlbnR0a2FjQGdtYWlsLmNvbSIsImV4cCI6MTc4OTM5ODM2NH0.8L7uuoUBmkKrHXsj-eqvTLQZZHaHgESYDLZFs7Aw-6Q" 
            data-language="en"></script>
    </div>
</div>

</body>
</html>
